  <div id="clean-output"></div>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/turndown.js"></script>
  <script src="../lib/turndown-plugin-gfm.js"></script>
  
  <script>
    function runCleaner() {
      const inputHtml = document.getElementById('dirty-input').innerHTML;
      
      try {
        let htmlText = inputHtml;

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const tables = doc.querySelectorAll('table');

        let modified = false;

        const cells = doc.querySelectorAll('td div, th div');
        Array.from(cells).forEach(div => {
            const span = doc.createElement('span');
            span.append(...div.childNodes);
            div.replaceWith(span);
            modified = true;
        });

        tables.forEach(table => {
          const firstRow = table.rows[0];
          if (firstRow && !table.tHead) {
            const isImplicitHeader = Array.from(firstRow.cells).every(cell => cell.tagName === 'TH');

            if (!isImplicitHeader) {
              const thead = doc.createElement('thead');
              const tr = doc.createElement('tr');
              for (let i = 0; i < firstRow.cells.length; i++) {
                const th = doc.createElement('th');
                th.textContent = firstRow.cells[i]?.textContent || "";
                tr.appendChild(th);
              }
              thead.appendChild(tr);
              table.insertBefore(thead, table.firstChild);
              firstRow.remove();
              modified = true;
            }
          }
        });

        if (modified) {
          htmlText = doc.body.innerHTML;
        }

        const cleanHtml = DOMPurify.sanitize(htmlText, {
            ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'ul', 'ol', 'li', 'b', 'i', 'strong', 'em', 'u', 'a', 'img', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'br', 'hr', 'blockquote', 'code', 'pre'],
            ALLOWED_ATTR: ['href', 'src', 'alt', 'title'],
            ALLOW_DATA_ATTR: false
        });

        const turndownService = new TurndownService({
          headingStyle: 'atx',
          codeBlockStyle: 'fenced'
        });
        turndownService.use(turndownPluginGfm.gfm);

        let markdown = turndownService.turndown(cleanHtml);
        
        markdown = markdown.replace(/\[([\s\S]+?)\]\((.*?)\)/g, (match, innerText, href) => {
            return `[${innerText.trim().replace(/\s+/g, ' ')}](${href})`;
        });

        document.getElementById('clean-output').innerText = markdown;
        document.getElementById('clean-output').style.whiteSpace = "pre-wrap";
        document.getElementById('clean-output').style.fontFamily = "monospace";
      } catch (e) {
        document.getElementById('clean-output').innerText = "ERROR: " + e.message;
      }
    }

    window.onload = runCleaner;
  </script>
